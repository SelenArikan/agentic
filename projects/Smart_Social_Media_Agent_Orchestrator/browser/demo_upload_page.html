<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local Demo Social Upload</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(135deg, #f4efe5 0%, #dfe8d8 100%);
      color: #20382e;
    }
    main {
      max-width: 760px;
      margin: 48px auto;
      padding: 32px;
      background: rgba(255, 255, 255, 0.78);
      border: 2px solid #254236;
      box-shadow: 16px 16px 0 #254236;
    }
    label {
      display: block;
      margin-top: 18px;
      font-weight: 700;
    }
    textarea, input {
      width: 100%;
      box-sizing: border-box;
      margin-top: 8px;
      padding: 12px;
      border: 1px solid #6b7d71;
      background: #fffdf8;
      font: inherit;
    }
    button {
      margin-top: 20px;
      padding: 12px 24px;
      border: 0;
      background: #254236;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    #status {
      margin-top: 20px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Local Demo Upload Page</h1>
    <p>This page simulates the final social media posting step. It does not connect to Instagram, TikTok, Facebook, LinkedIn, or X.</p>

    <label for="caption">Caption</label>
    <textarea id="caption" rows="8"></textarea>

    <label for="media">Media File</label>
    <input id="media" type="file" accept="image/*,video/mp4">

    <button id="share-button" type="button">Share</button>
    <div id="status" role="status">Waiting for upload.</div>
  </main>

  <script>
    document.getElementById("share-button").addEventListener("click", () => {
      const caption = document.getElementById("caption").value.trim();
      const media = document.getElementById("media").files[0];
      const status = document.getElementById("status");

      if (!caption) {
        status.textContent = "Error: caption is required.";
        return;
      }

      if (!media) {
        status.textContent = "Error: media file is required.";
        return;
      }

      status.textContent = "Success: local demo post is ready.";
    });
  </script>
</body>
</html>
